version: '3.8'

services:
  backend:
    build: ./glaucomaproject
    ports:
      - "8000:8000"
    volumes:
      - ./glaucomaproject:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "8081:8081"
    volumes:
      - ./frontend:/app
      # prevent overwriting the node_modules directory which we already installed inside container
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
